<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing: border-box;
        font-family:"Gilroy";
    }
    html,body{
        width: 100%;
        height: 100%;
    }

    #main{
        width: 100%;
        height: 100%;
        background-color: #222;
        display:flex;
        align-items: center;
        justify-content: center;
    }
    input{
        display: none;
    }
    #btn{
        padding: 12px 22px;
        background-color: rgb(41,143,114);
        color: white;
        font-weight: 600;
        border-radius: 5px;
    }
    #btn:hover{
        background-color: rgb(24,82,66) !important;
    }
</style>
<body>
    <div id="main">
      <input id="fileinp" type="file">
      <div id="btn"> Upload File </div>
    </div>
    <script src="fileInput.js"></script>
</body>
</html>
